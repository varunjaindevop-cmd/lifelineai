# Indian Road Accident Detection Dataset Configuration
# Custom YOLOv8n training for SAGE accident detection system

# Dataset paths (relative to this file)
# After running prepare_dataset.py, these will point to downloaded data
train: ./data/train/images
val: ./data/val/images
test: ./data/test/images

# Number of classes
nc: 10

# Class names
names:
  0: car
  1: truck
  2: bus
  3: motorcycle
  4: bicycle
  5: person
  6: bike_fallen
  7: person_down
  8: vehicle_fire
  9: debris
